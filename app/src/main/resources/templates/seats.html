<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineTick - Seat Selection</title>
    <link rel="stylesheet" href="/seats.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="seats-body">
    <nav class="top-nav">
        <div class="nav-links">
            <a href="/" class="bold">Home</a>
            <a href="/movies" class="bold">Movies</a>
            <a href="#" class="bold">About</a>
            
            <th:block th:if="${isUserLoggedIn == true}">
                <a href="/mytickets" class="bold">MyTicket</a>
            </th:block>
        </div>
        
        <div class="logout-link">
            <th:block th:if="${isUserLoggedIn == true}">
                <a href="/logout" class="bold">Logout</a>
            </th:block>
            <th:block th:if="${isUserLoggedIn == false}">
                <a href="/user-login" class="bold">Login</a>
            </th:block>
        </div>
    </nav>

    <main class="seats-container">
        <h1 th:text="'Select Seats for ' + ${title}">Seat Selection</h1>
        
        <form action="/seats/proceed" method="POST">
            <input type="hidden" name="title" th:value="${title}">

            <div class="seat-grid">
                <th:block th:each="row : ${rows}">
                    <div class="seat-row">
                        <th:block th:each="col : ${#numbers.sequence(1, 10)}">
                            <div class="seat-wrapper">
                                <input type="checkbox" 
                                       name="seats" 
                                       th:value="${row} + ${col}" 
                                       th:id="${row} + ${col}" 
                                       class="seat-checkbox">
                                
                                <label th:for="${row} + ${col}" 
                                       class="seat-box" 
                                       th:text="${row} + ${col}"></label>
                            </div>
                        </th:block>
                    </div>
                </th:block>
            </div>

            <div class="selection-summary">
                <div class="summary-text">
                    <p>*Select your seats above</p>
                </div>
                <button type="submit" class="proceed-btn-large">Proceed</button>
            </div>
        </form>
    </main>

    <footer class="booking-footer">
        <a th:href="'/booking/' + ${title}" class="back-link">&lt; Back</a>
    </footer>
</body>
</html>
