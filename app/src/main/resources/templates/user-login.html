<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineTick - Sign In</title>
    <link rel="stylesheet" th:href="@{/login.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="checkout-body">

    <main class="login-card-container">
        <div class="tab-system">
            <input type="radio" name="tab" id="login-tab" checked class="hidden-radio">
            <input type="radio" name="tab" id="register-tab" class="hidden-radio">
            
            <div class="tab-header">
                <label for="login-tab">Login</label>
                <label for="register-tab">Register</label>
            </div>

            <div class="form-content login-form">
                <h1 class="login-title">Sign In</h1>
                <p class="login-subtitle">Access your account to complete your booking.</p>
                
                <form th:action="@{/user-login}" method="POST">
                    <input type="hidden" name="title" th:value="${title}">
                    <input type="hidden" name="seats" th:value="${seats}">
                    
                    <div class="login-group">
                        <label>Username</label>
                        <input type="text" name="username" class="login-field" placeholder="Enter username" required>
                    </div>
                    <div class="login-group">
                        <label>Password</label>
                        <input type="password" name="password" class="login-field" placeholder="••••••••" required>
                    </div>

                    <p th:if="${error != null}" th:text="${error}" class="error-msg" 
                       style="color: #ff4d4d; text-align: center; font-size: 0.85rem; font-weight: 600;"></p>

                    <button type="submit" class="login-btn">Login & Continue</button>
                </form>
            </div>

            <div class="form-content register-form">
                <h1 class="login-title">Create Account</h1>
                <p class="login-subtitle">Join CineTick for faster booking and rewards.</p>
                
                <form th:action="@{/user-register}" method="POST">
                    <div class="login-group">
                        <label>Name</label>
                        <input type="text" name="fullname" class="login-field" placeholder="Your name" required>
                    </div>
                    <div class="login-group">
                        <label>Username</label>
                        <input type="text" name="username" class="login-field" placeholder="Choose username" required>
                    </div>
                    <div class="login-group">
                        <label>Password</label>
                        <input type="password" name="password" class="login-field" placeholder="Create password" required>
                    </div>
                    <button type="submit" class="login-btn">Register Now</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
