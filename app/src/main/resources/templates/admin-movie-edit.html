<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie - CineTick Admin</title>
    <link rel="stylesheet" href="/admin-movie-edit.css">
</head>
<body class="admin-create-body">
    <div class="admin-layout">
        <div class="main" style="margin-left:0; width:100%;">
            <div class="content">
                <div class="form-card">
                    <h1>Edit Movie</h1>
                    
                    <form action="/admin/movies/update" method="POST">
                        
                        <input type="hidden" name="id" th:value="${movie.id}">
                        
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" th:value="${movie.title}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Genre</label>
                            <input type="text" name="genre" th:value="${movie.genre}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Runtime</label>
                            <input type="text" name="runtime" th:value="${movie.runtime}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Price (Php)</label>
                            <input type="number" name="price" step="0.01" th:value="${movie.price}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status">
                                <option value="Active" th:selected="${movie.status == 'Active'}">Active</option>
                                <option value="Inactive" th:selected="${movie.status == 'Inactive'}">Inactive</option>
                            </select>
                        </div>
                        
                        <div class="form-actions">
                            <a href="/admin/movies" class="btn-cancel" style="text-decoration: none;">Cancel</a>
                            <button type="submit" class="btn-save">Update Movie</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
