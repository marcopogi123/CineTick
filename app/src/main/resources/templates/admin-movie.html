<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineTick Admin - Movie Management</title>
    <link rel="stylesheet" href="/admin-movie.css">
</head>
<body class="admin-body">
    <div class="admin-layout">
          <div class="sidebar">
    <div class="sidebar-logo">CineTick</div>
    <ul>
        <li class="active"><a href="/admin/movies">Movies</a></li>
        <li><a href="/admin/orders">Orders</a></li>
        <li class="logout-item"><a href="/logout">Logout</a></li>
    </ul>
</div>
        
        <div class="main">
            <div class="content">
                <div class="top-bar">
                    <h1>Movie Management</h1>
                    <a href="/admin/movies/create" class="create-btn" style="text-decoration:none;">+ Create new</a>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Genre</th>
                                <th>Runtime</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <th:block th:each="movie : ${adminMovies}">
                                <tr>
                                    <td th:text="${movie.id}">1</td>
                                    <td th:text="${movie.title}" class="bold">Movie Title</td>
                                    <td th:text="${movie.genre}">Genre</td>
                                    <td th:text="${movie.runtime}">0 mins</td>
                                    <td th:text="'₱' + ${movie.price}">₱0.00</td>
                                    
                                    <td>
                                        <span th:text="${movie.status}" 
                                              th:classappend="${movie.status == 'Active'} ? 'status-badge active-status' : 'status-badge inactive-status'">
                                        </span>
                                    </td>
                                    
                                    <td class="actions">
                                        <a th:href="'/admin/movies/edit/' + ${movie.id}" class="edit-action" style="text-decoration:none;">✏</a>
                                        <a th:href="'/admin/movies/delete/' + ${movie.id}" 
                                           onclick="return confirm('Are you sure you want to delete this movie?')" 
                                           class="delete-action" style="text-decoration:none;">🗑</a>
                                    </td>
                                </tr>
                            </th:block>
                            </tbody>
                    </table>
                </div>

                <th:block th:if="${adminMovies == null or adminMovies.isEmpty()}">
                    <div style="text-align: center; padding: 50px; color: #888;">
                        <p>No movies found in the database. Click "+ Create new" to add one.</p>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</body>
</html>
